services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATA_PATH=/app/data/students.csv
      - DB_PATH=/app/data/analytics.duckdb
      # Override in production: generate with `python -c "import secrets; print(secrets.token_hex(32))"`
      - SECRET_KEY=${SECRET_KEY:-change-me-set-SECRET_KEY-env-var}
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - API_TARGET=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
